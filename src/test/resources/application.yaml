spring:
  datasource:
    url: jdbc:h2:mem:messaging;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate.format_sql: true
  h2:
    console:
      enabled: true          # browse schema at /h2-console during dev

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-in-prod-min-32-chars}
    ttl-minutes: 60
    issuer: messaging-service

management:
  endpoints:
    web:
      exposure:
        include: health